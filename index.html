<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreStack | Studio Management</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .glass-modal { backdrop-filter: blur(16px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ══════════════════════════════════════
        //  SUPABASE
        // ══════════════════════════════════════
        const _db = supabase.createClient(
            'https://qttswdwrzxkdprjkidbk.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dHN3ZHdyenhrZHByamtpZGJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTE2NjYsImV4cCI6MjA4OTQ4NzY2Nn0.BAZ3PvkvfE24etcKlEN5x6feLjziKFuts51JwrvgAvk'
        );

        // ══════════════════════════════════════
        //  ICONS
        // ══════════════════════════════════════
        const Icons = {
            Zap:      () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
            Plus:     () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            Pencil:   () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
            Trash:    () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            User:     () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Layers:   () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
            External: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
            Sun:      () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
            Moon:     () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
            Github:   () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>,
            X:        () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        };

        // ══════════════════════════════════════
        //  MODAL
        // ══════════════════════════════════════
        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                    <div className="glass-modal w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10">
                        <div className="flex items-center justify-between p-7 border-b border-slate-100 dark:border-white/10">
                            <h3 className="text-xl font-bold tracking-tight">{title}</h3>
                            <button onClick={onClose} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-slate-100 dark:hover:bg-white/10 rounded-xl transition-all">
                                <Icons.X />
                            </button>
                        </div>
                        <div className="p-7 max-h-[80vh] overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        // ══════════════════════════════════════
        //  TOAST
        // ══════════════════════════════════════
        const Toast = ({ msg, type }) => {
            if (!msg) return null;
            const colors = { ok: 'bg-green-500', error: 'bg-red-500', loading: 'bg-indigo-500' };
            return (
                <div className={`fixed bottom-6 right-6 z-[100] text-white text-sm font-bold px-5 py-3 rounded-2xl shadow-xl ${colors[type]}`}>
                    {type === 'loading' && <span className="spin mr-2">⟳</span>}
                    {msg}
                </div>
            );
        };

        const inputCls = "w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-white/10 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white placeholder-slate-400";
        const labelCls = "text-xs font-bold text-slate-400 ml-1 mb-1 block";

        // ══════════════════════════════════════
        //  APP
        // ══════════════════════════════════════
        const App = () => {
            const [students, setStudents]             = useState([]);
            const [projects, setProjects]             = useState([]);
            const [isDarkMode, setIsDarkMode]         = useState(true);
            const [loading, setLoading]               = useState(true);
            const [saving, setSaving]                 = useState(false);
            const [toast, setToast]                   = useState({ msg: '', type: 'ok' });
            const [isStudentModalOpen, setStudentModal] = useState(false);
            const [isProjectModalOpen, setProjectModal] = useState(false);
            const [editingStudent, setEditingStudent] = useState(null);
            const [editingProject, setEditingProject] = useState(null);

            const showToast = (msg, type = 'ok', duration = 2500) => {
                setToast({ msg, type });
                if (type !== 'loading') setTimeout(() => setToast({ msg: '' }), duration);
            };

            // Dark mode
            useEffect(() => {
                isDarkMode
                    ? document.documentElement.classList.add('dark')
                    : document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            // ── Load from Supabase ──
            useEffect(() => {
                (async () => {
                    try {
                        showToast('Loading...', 'loading');
                        const [{ data: mem, error: e1 }, { data: proj, error: e2 }] = await Promise.all([
                            _db.from('members').select('*').order('sort_order'),
                            _db.from('projects').select('*').order('sort_order'),
                        ]);
                        if (e1) throw e1;
                        if (e2) throw e2;

                        setStudents((mem || []).map(m => ({
                            id:     m.id,
                            slug:   m.slug,
                            name:   m.name   || '',
                            role:   m.role   || '',
                            github: m.github || '',
                            bio:    m.bio    || '',
                        })));

                        setProjects((proj || []).map(p => ({
                            id:       p.id,
                            slug:     p.slug,
                            title:    p.title       || '',
                            desc:     p.description || '',
                            techs:    (p.tags || []).join(', '),
                            github:   p.github || '',
                            demo:     p.demo   || '',
                            authorSlug: (p.authors || [])[0] || '',
                        })));

                        setToast({ msg: '' });
                    } catch (err) {
                        console.error(err);
                        showToast('Failed to load data', 'error', 4000);
                    } finally {
                        setLoading(false);
                    }
                })();
            }, []);

            // ── Save Student ──
            const handleStudentSubmit = async (e) => {
                e.preventDefault();
                setSaving(true);
                showToast('Saving...', 'loading');
                const fd   = new FormData(e.target);
                const name = fd.get('name').trim();
                const row  = {
                    name,
                    role:         fd.get('role'),
                    github:       fd.get('github').trim(),
                    bio:          fd.get('bio').trim(),
                    avatar:       name.split(' ').map(w => w[0] || '').join('').toUpperCase().slice(0, 2),
                    avatar_color: '#818cf8',
                    skills:       [],
                };
                try {
                    if (editingStudent) {
                        const { error } = await _db.from('members').update(row).eq('id', editingStudent.id);
                        if (error) throw error;
                        setStudents(prev => prev.map(s =>
                            s.id === editingStudent.id ? { ...s, ...row } : s
                        ));
                    } else {
                        const slug = 'member' + Date.now();
                        const { data, error } = await _db
                            .from('members')
                            .insert({ ...row, slug, sort_order: students.length })
                            .select()
                            .single();
                        if (error) throw error;
                        setStudents(prev => [...prev, { ...row, id: data.id, slug }]);
                    }
                    showToast('✓ Saved!', 'ok');
                    setStudentModal(false);
                    setEditingStudent(null);
                } catch (err) {
                    console.error(err);
                    showToast('Error: ' + err.message, 'error', 4000);
                } finally {
                    setSaving(false);
                }
            };

            // ── Delete Student ──
            const deleteStudent = async () => {
                if (!editingStudent) return;
                try {
                    await _db.from('members').delete().eq('id', editingStudent.id);
                    setStudents(prev => prev.filter(s => s.id !== editingStudent.id));
                    showToast('Deleted', 'ok');
                } catch (err) {
                    showToast('Error: ' + err.message, 'error', 4000);
                }
                setStudentModal(false);
                setEditingStudent(null);
            };

            // ── Save Project ──
            const handleProjectSubmit = async (e) => {
                e.preventDefault();
                setSaving(true);
                showToast('Saving...', 'loading');
                const fd  = new FormData(e.target);
                const row = {
                    title:       fd.get('title').trim(),
                    description: fd.get('desc').trim(),
                    tags:        fd.get('techs').split(',').map(t => t.trim()).filter(Boolean),
                    github:      fd.get('github').trim(),
                    demo:        fd.get('demo').trim(),
                    authors:     fd.get('authorSlug') ? [fd.get('authorSlug')] : [],
                    featured:    false,
                };
                try {
                    if (editingProject) {
                        const { error } = await _db.from('projects').update(row).eq('id', editingProject.id);
                        if (error) throw error;
                        setProjects(prev => prev.map(p =>
                            p.id === editingProject.id
                                ? { ...p, title: row.title, desc: row.description, techs: fd.get('techs'), github: row.github, demo: row.demo, authorSlug: fd.get('authorSlug') }
                                : p
                        ));
                    } else {
                        const slug = 'proj' + Date.now();
                        const { data, error } = await _db
                            .from('projects')
                            .insert({ ...row, slug, sort_order: projects.length })
                            .select()
                            .single();
                        if (error) throw error;
                        setProjects(prev => [...prev, {
                            id: data.id, slug,
                            title: row.title, desc: row.description,
                            techs: fd.get('techs'), github: row.github, demo: row.demo,
                            authorSlug: fd.get('authorSlug'),
                        }]);
                    }
                    showToast('✓ Saved!', 'ok');
                    setProjectModal(false);
                    setEditingProject(null);
                } catch (err) {
                    console.error(err);
                    showToast('Error: ' + err.message, 'error', 4000);
                } finally {
                    setSaving(false);
                }
            };

            // ── Delete Project ──
            const deleteProject = async () => {
                if (!editingProject) return;
                try {
                    await _db.from('projects').delete().eq('id', editingProject.id);
                    setProjects(prev => prev.filter(p => p.id !== editingProject.id));
                    showToast('Deleted', 'ok');
                } catch (err) {
                    showToast('Error: ' + err.message, 'error', 4000);
                }
                setProjectModal(false);
                setEditingProject(null);
            };

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center flex-col gap-4 text-slate-500">
                    <span className="spin text-3xl text-indigo-500">⟳</span>
                    <p className="text-sm font-medium">Connecting to database...</p>
                </div>
            );

            return (
                <div className="min-h-screen pb-20">

                    {/* NAV */}
                    <nav className="py-10 px-6 max-w-7xl mx-auto flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg text-white">
                                <Icons.Zap />
                            </div>
                            <h1 className="text-2xl font-black tracking-tighter uppercase">CoreStack</h1>
                        </div>
                        <button
                            onClick={() => setIsDarkMode(!isDarkMode)}
                            className="p-3 bg-slate-200 dark:bg-slate-800 rounded-2xl text-indigo-600 dark:text-indigo-400 hover:scale-110 transition-transform"
                        >
                            {isDarkMode ? <Icons.Sun /> : <Icons.Moon />}
                        </button>
                    </nav>

                    {/* HERO */}
                    <header className="px-6 max-w-7xl mx-auto mb-16">
                        <h2 className="text-5xl md:text-7xl font-extrabold mb-6 leading-tight tracking-tight">
                            Creating modern{' '}
                            <span className="text-indigo-600 dark:text-indigo-500">digital products.</span>
                        </h2>
                        <p className="text-slate-600 dark:text-slate-400 text-xl md:text-2xl font-medium">
                            A group of second-year software engineering students building web applications.
                        </p>
                    </header>

                    <main className="px-6 max-w-7xl mx-auto space-y-24">

                        {/* ── STUDENTS ── */}
                        <section>
                            <div className="flex justify-between items-end mb-10">
                                <div>
                                    <h3 className="text-3xl font-bold mb-2">The Collective</h3>
                                    <p className="text-slate-500">Talent driving innovation.</p>
                                </div>
                                <button
                                    onClick={() => { setEditingStudent(null); setStudentModal(true); }}
                                    className="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-xl hover:bg-indigo-700 active:scale-95 transition-all"
                                >
                                    <Icons.Plus /> Add Student
                                </button>
                            </div>

                            {students.length === 0
                                ? <div className="py-20 text-center border-2 border-dashed border-slate-300 dark:border-slate-800 rounded-3xl text-slate-500">Empty collective. Add your first student!</div>
                                : <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {students.map(student => (
                                        <div key={student.id} className="group relative bg-white dark:bg-slate-900 p-6 rounded-3xl border border-slate-200 dark:border-white/5 shadow-sm transition-all hover:border-indigo-500 hover:shadow-xl">
                                            <button
                                                onClick={() => { setEditingStudent(student); setStudentModal(true); }}
                                                className="absolute top-4 right-4 p-2 opacity-0 group-hover:opacity-100 bg-indigo-600 text-white rounded-xl transition-all"
                                            >
                                                <Icons.Pencil />
                                            </button>
                                            <div className="w-12 h-12 bg-indigo-100 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-500 rounded-2xl flex items-center justify-center mb-4 font-bold text-sm">
                                                {student.name.split(' ').map(w => w[0] || '').join('').toUpperCase().slice(0, 2) || <Icons.User />}
                                            </div>
                                            <h4 className="text-lg font-bold mb-1">{student.name}</h4>
                                            <p className="text-indigo-600 dark:text-indigo-400 text-xs font-bold uppercase tracking-widest mb-3">{student.role}</p>
                                            {student.bio && <p className="text-slate-500 text-sm mb-3 line-clamp-2">{student.bio}</p>}
                                            {student.github && (
                                                <a href={student.github} target="_blank" className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 text-sm transition-colors">
                                                    <Icons.Github /> github
                                                </a>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            }
                        </section>

                        {/* ── PROJECTS ── */}
                        <section>
                            <div className="flex justify-between items-end mb-10">
                                <div>
                                    <h3 className="text-3xl font-bold mb-2">Recent Projects</h3>
                                    <p className="text-slate-500">Modern applications built for the web.</p>
                                </div>
                                <button
                                    onClick={() => { setEditingProject(null); setProjectModal(true); }}
                                    className="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-xl hover:bg-indigo-700 active:scale-95 transition-all"
                                >
                                    <Icons.Plus /> Add Project
                                </button>
                            </div>

                            {projects.length === 0
                                ? <div className="py-20 text-center border-2 border-dashed border-slate-300 dark:border-slate-800 rounded-3xl text-slate-500">No projects listed yet.</div>
                                : <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {projects.map(project => {
                                        const author = students.find(s => s.slug === project.authorSlug);
                                        return (
                                            <div key={project.id} className="group relative bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border border-slate-200 dark:border-white/5 shadow-sm transition-all hover:border-indigo-500 hover:shadow-2xl">
                                                <div className="flex justify-between items-start mb-6">
                                                    <div className="p-4 bg-indigo-100 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-500 rounded-2xl">
                                                        <Icons.Layers />
                                                    </div>
                                                    <button
                                                        onClick={() => { setEditingProject(project); setProjectModal(true); }}
                                                        className="p-3 bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-white hover:bg-indigo-600 rounded-2xl transition-all"
                                                    >
                                                        <Icons.Pencil />
                                                    </button>
                                                </div>
                                                <h4 className="text-2xl font-bold mb-3">{project.title}</h4>
                                                <p className="text-slate-600 dark:text-slate-400 mb-6 line-clamp-2 text-sm">{project.desc}</p>
                                                <div className="flex flex-wrap gap-2 mb-8">
                                                    {(project.techs || '').split(',').map((t, i) => (
                                                        <span key={i} className="text-[10px] font-bold uppercase bg-indigo-100 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 px-3 py-1 rounded-lg">
                                                            {t.trim()}
                                                        </span>
                                                    ))}
                                                </div>
                                                <div className="flex items-center justify-between pt-6 border-t border-slate-100 dark:border-white/5">
                                                    <span className="text-sm font-semibold text-slate-700 dark:text-slate-300">
                                                        By: {author?.name || '—'}
                                                    </span>
                                                    <div className="flex gap-4">
                                                        {project.github && (
                                                            <a href={project.github} target="_blank" className="text-slate-400 hover:text-indigo-600 transition-colors">
                                                                <Icons.Github />
                                                            </a>
                                                        )}
                                                        {project.demo && (
                                                            <a href={project.demo} target="_blank" className="text-slate-400 hover:text-indigo-600 transition-colors">
                                                                <Icons.External />
                                                            </a>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            }
                        </section>
                    </main>

                    {/* ── STUDENT MODAL ── */}
                    <Modal
                        isOpen={isStudentModalOpen}
                        onClose={() => { setStudentModal(false); setEditingStudent(null); }}
                        title={editingStudent ? 'Edit Student' : 'New Student'}
                    >
                        <form onSubmit={handleStudentSubmit} className="space-y-4">
                            <div>
                                <label className={labelCls}>Full Name</label>
                                <input name="name" defaultValue={editingStudent?.name} required placeholder="Full Name" className={inputCls} />
                            </div>
                            <div>
                                <label className={labelCls}>Role</label>
                                <select name="role" defaultValue={editingStudent?.role} className={inputCls}>
                                    <option>Frontend</option>
                                    <option>Backend</option>
                                    <option>Full-Stack</option>
                                    <option>Designer</option>
                                    <option>DevOps</option>
                                </select>
                            </div>
                            <div>
                                <label className={labelCls}>Bio (1–2 sentences)</label>
                                <textarea name="bio" defaultValue={editingStudent?.bio} placeholder="Short bio..." rows="2" className={inputCls} style={{resize:'none'}} />
                            </div>
                            <div>
                                <label className={labelCls}>GitHub Link</label>
                                <input name="github" defaultValue={editingStudent?.github} placeholder="https://github.com/username" className={inputCls} />
                            </div>
                            <div className="flex gap-3 pt-2">
                                <button type="submit" disabled={saving} className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-500/30 disabled:opacity-60 transition-all">
                                    {saving ? '⟳ Saving...' : 'Save Profile'}
                                </button>
                                {editingStudent && (
                                    <button type="button" onClick={deleteStudent} className="p-4 bg-red-500 text-white rounded-2xl hover:bg-red-600 transition-all">
                                        <Icons.Trash />
                                    </button>
                                )}
                            </div>
                        </form>
                    </Modal>

                    {/* ── PROJECT MODAL ── */}
                    <Modal
                        isOpen={isProjectModalOpen}
                        onClose={() => { setProjectModal(false); setEditingProject(null); }}
                        title={editingProject ? 'Edit Project' : 'New Project'}
                    >
                        <form onSubmit={handleProjectSubmit} className="space-y-4">
                            <div>
                                <label className={labelCls}>Project Title</label>
                                <input name="title" defaultValue={editingProject?.title} required placeholder="Title" className={inputCls} />
                            </div>
                            <div>
                                <label className={labelCls}>Description</label>
                                <textarea name="desc" defaultValue={editingProject?.desc} required placeholder="Describe the goal (2–3 sentences)" rows="3" className={inputCls} style={{resize:'none'}} />
                            </div>
                            <div>
                                <label className={labelCls}>Tech Stack (comma-separated)</label>
                                <input name="techs" defaultValue={editingProject?.techs} required placeholder="React, Node.js, Python..." className={inputCls} />
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className={labelCls}>GitHub Link</label>
                                    <input name="github" defaultValue={editingProject?.github} placeholder="https://github.com/..." className={inputCls} />
                                </div>
                                <div>
                                    <label className={labelCls}>Demo Link</label>
                                    <input name="demo" defaultValue={editingProject?.demo} placeholder="https://demo-link.com" className={inputCls} />
                                </div>
                            </div>
                            <div>
                                <label className={labelCls}>Author</label>
                                <select name="authorSlug" defaultValue={editingProject?.authorSlug} className={inputCls}>
                                    <option value="">— Select Author —</option>
                                    {students.map(s => (
                                        <option key={s.id} value={s.slug}>{s.name}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="flex gap-3 pt-2">
                                <button type="submit" disabled={saving} className="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-500/30 disabled:opacity-60 transition-all active:scale-95">
                                    {saving ? '⟳ Saving...' : 'Save Project'}
                                </button>
                                {editingProject && (
                                    <button type="button" onClick={deleteProject} className="p-4 bg-red-500 text-white rounded-2xl hover:bg-red-600 transition-all">
                                        <Icons.Trash />
                                    </button>
                                )}
                            </div>
                        </form>
                    </Modal>

                    <Toast msg={toast.msg} type={toast.type} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
